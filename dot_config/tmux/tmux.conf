set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:UTF-8"
set -g extended-keys on
set -ga terminal-features "*:extkeys"
set -ga terminal-features "*:RGB" # 状态栏用了 Tokyo Night 的 hex 颜色，需要真彩色

# window 编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 默认 fish shell
set-option -g default-shell /opt/homebrew/bin/fish 

# 鼠标支持
set -g mouse on

# 把 focus 事件转发给 pane 内的程序（如 nvim 的 FocusGained），
# 否则切 pane 时 nvim 收不到通知，不会自动 :checktime
set -g focus-events on

# Window tab style
set -g status-style "bg=#1a1b26,fg=#a9b1d6" # Tokyo Night 主背景
set -g window-status-separator " "  
# #{@claude_icon} 由 ~/.config/claude-tmux-status/ticker.sh 高频写入（含颜色指令）
set -g window-status-format " #I:#W#{@claude_icon} "
set -g window-status-style "bg=#1a1b26,fg=#565f89"
set -g window-status-current-format " #I:#W#{@claude_icon} "
set -g window-status-current-style "bg=#292e42,fg=#7aa2f7,bold"
# tab 标题：程序设置过 pane 标题（如 Claude Code 的任务摘要）就用它——剥掉开头的
# 状态字形（✳/⠐ 会动、且 ✳ 是 emoji 宽度字符会抖）并截断到 30 格；否则回退到当前目录名。
# 仍然 allow-rename off：程序只能改 pane 标题，窗口名统一由这里的 format 生成。
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_title},#{host}},#{b:pane_current_path},#{s|^[^ ]* ||;=/30/…:pane_title}}'
setw -g allow-rename off
set -g status-interval 1   # 状态栏刷新间隔（单位：秒）
set -g status-position bottom # 状态栏位置（top 或 bottom）
set -g status-left ""  # 左侧不显示（原来是 session 名）
set -g status-right "" # 右侧不显示（默认会显示 pane 标题和日期）

# Claude Code 完成后 tab 上的 ✓ 常驻，用户视线到达该 window（切 tab / 切 session /
# attach）时清除。if -F 在 tmux 进程内求值、零进程开销；hook 上下文的当前 window
# 就是切入的那个 window。
set-hook -g session-window-changed { if -F '#{==:#{@claude_state},done}' { set -w -u @claude_state ; set -w -u @claude_icon } }
set-hook -g client-session-changed { if -F '#{==:#{@claude_state},done}' { set -w -u @claude_state ; set -w -u @claude_icon } }
set-hook -g client-attached        { if -F '#{==:#{@claude_state},done}' { set -w -u @claude_state ; set -w -u @claude_icon } }
# claude code
set -g allow-passthrough on

# ---------- 快捷键 ----------------

unbind %
unbind '"'

bind-key o choose-tree -s -O time
bind-key l switch -l
# 重加载配置
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
# 重设分屏
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

run '~/.tmux/plugins/tpm/tpm'
